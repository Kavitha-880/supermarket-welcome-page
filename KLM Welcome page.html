<!DOCTYPE html>
<html>
<head>
<title>KLM Freshmart</title>

<style>
body {
    background: linear-gradient(to right, #f6d365, #fda085);
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container {
    text-align:center;
    background: rgba(255,255,255,0.9);
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    animation: fadeIn 1.5s ease;
}

img {
    width:120px;
    margin-bottom:10px;
    animation: float 3s ease-in-out infinite;
}

h1 {
    color:#ff7e5f;
    margin:10px 0;
    font-size:36px;
}

p {
    color:#333;
    margin-bottom:20px;
    font-size:18px;
}

button {
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background-color:#ff7e5f;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover {
    background-color:#ff3e1d;
    transform:scale(1.05);
}

/* Animations */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

@keyframes float {
    0%,100% {transform:translateY(0);}
    50% {transform:translateY(-10px);}
}
</style>

</head>

<body>

<div class="container">

    <img src="https://github.com/lavanyasureshbabu/KLM-FRESHMART-/raw/main/logo.png">

    <h1>KLM Freshmart</h1>

    <p>Welcome to your Smart Shopping Experience 🛒</p>

    <button onclick="go()">Enter Store</button>

</div>

<script>
function go(){
    window.location.href="KLM login.html";
}
</script>

</body>
</html>
